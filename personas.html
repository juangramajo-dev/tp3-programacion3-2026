<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Ejercicio 2 - Personas</title>
  </head>
  <body>
    <a href="index.html" class="volver">← Volver al inicio</a>

    <h1>Ejercicio 2 - Formulario de Personas</h1>

    <form id="formulario">
      <h2>Agregar persona</h2>

      <label>Nombre:</label>
      <input type="text" id="nombre" placeholder="Ej: Juan" />

      <label>Apellido:</label>
      <input type="text" id="apellido" placeholder="Ej: García" />

      <label>Edad:</label>
      <input type="number" id="edad" placeholder="Ej: 25" min="0" />

      <label>Altura (metros):</label>
      <input
        type="number"
        id="altura"
        placeholder="Ej: 1.75"
        step="0.01"
        min="0"
      />

      <label>Peso (kg):</label>
      <input type="number" id="peso" placeholder="Ej: 70" step="0.1" min="0" />

      <button type="button">Agregar</button>
    </form>

    <table id="tabla">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
          <th>Altura (m)</th>
          <th>Peso (kg)</th>
          <th>IMC</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
        <td style="text-align: center" colspan="7">
          No hay personas cargadas.
        </td>
      </tbody>
    </table>
  </body>
</html>
