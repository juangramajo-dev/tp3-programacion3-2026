<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Ejercicio 2 - Personas</title>
  </head>
  <body>
    <a href="index.html" class="volver">← Volver al inicio</a>

    <h1>Ejercicio 2 - Formulario de Personas</h1>

    <form id="formulario">
      <h2>Agregar persona</h2>

      <label>Nombre:</label>
      <input type="text" id="nombre" placeholder="Ej: Juan" />

      <label>Apellido:</label>
      <input type="text" id="apellido" placeholder="Ej: García" />

      <label>Edad:</label>
      <input type="number" id="edad" placeholder="Ej: 25" min="0" />

      <label>Altura (metros):</label>
      <input
        type="number"
        id="altura"
        placeholder="Ej: 1.75"
        step="0.01"
        min="0"
      />

      <label>Peso (kg):</label>
      <input type="number" id="peso" placeholder="Ej: 70" step="0.1" min="0" />

        <p id="error">Por favor completá todos los campos con valores válidos.</p>


      <button type="button" onclick="agregarPersona()">Agregar</button>
    </form>

    <table id="tabla">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Apellido</th>
          <th>Edad</th>
          <th>Altura (m)</th>
          <th>Peso (kg)</th>
          <th>IMC</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="cuerpoTabla">
      
      </tbody>
    </table>

     <script>
        let personas = [];

        function agregarPersona() {
            let nombre   = document.getElementById("nombre").value.trim();
            let apellido = document.getElementById("apellido").value.trim();
            let edad     = document.getElementById("edad").value;
            let altura   = document.getElementById("altura").value;
            let peso     = document.getElementById("peso").value;
            let msgError = document.getElementById("error");

            if (nombre === "" || apellido === "" || edad === "" || altura === "" || peso === "") {
                msgError.style.display = "block";
                return;
            }

            edad   = parseInt(edad);
            altura = parseFloat(altura);
            peso   = parseFloat(peso);

            if (isNaN(edad) || isNaN(altura) || isNaN(peso) || edad <= 0 || altura <= 0 || peso <= 0) {
                msgError.style.display = "block";
                return;
            }

            msgError.style.display = "none";

            // Crear objeto persona y guardarla en el arreglo
            let persona = {
                nombre:   nombre,
                apellido: apellido,
                edad:     edad,
                altura:   altura,
                peso:     peso
            };
            personas.push(persona);

            agregarFila(persona, personas.length - 1);

            // Limpiar el formulario
            document.getElementById("nombre").value   = "";
            document.getElementById("apellido").value = "";
            document.getElementById("edad").value     = "";
            document.getElementById("altura").value   = "";
            document.getElementById("peso").value     = "";
        }

        function agregarFila(persona, indice) {
            let tbody = document.getElementById("cuerpoTabla");
            let fila = document.createElement("tr");
            fila.id = "fila-" + indice;

            fila.innerHTML =
                "<td>" + persona.nombre + "</td>" +
                "<td>" + persona.apellido + "</td>" +
                "<td>" + persona.edad + "</td>" +
                "<td>" + persona.altura + "</td>" +
                "<td>" + persona.peso + "</td>" +
                "<td>"+ "</td>" +
                "<td><button class='btn-eliminar' onclick='eliminarFila(" + indice + ")'>Eliminar</button></td>";

            tbody.appendChild(fila);
        }

        function eliminarFila(indice) {
            let fila = document.getElementById("fila-" + indice);
            if (fila) {
                fila.remove();
            }
            personas[indice] = null;
        }
    </script>
  
 
</body>
</html>
